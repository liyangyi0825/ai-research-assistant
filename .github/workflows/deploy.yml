name: 自动部署到服务器

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/ai-research-assistant
            git pull
            npm install
            npm run build
            pm2 restart ai-research-assistant --update-env 2>/dev/null || pm2 restart ai-research --update-env 2>/dev/null || echo "PM2重启失败，请手动检查进程名"
          command_timeout: 15m
